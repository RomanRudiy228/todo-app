@if (open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40" (click)="onClose()">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" (click)="$event.stopPropagation()">
      <h2 class="text-xl font-semibold mb-4">{{ task ? 'Edit task' : 'New task' }}</h2>
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
          <input
            formControlName="title"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none
              focus:ring-1 focus:ring-indigo-600/70 focus:border-indigo-600 transition-shadow" />
          @if (form.get('title')?.touched && form.get('title')?.hasError('zod')) {
            <p class="mt-1 text-sm text-red-600">{{ form.get('title')?.getError('zod') }}</p>
          }
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
          <textarea
            formControlName="description"
            rows="3"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none
              focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Due date</label>
            <input
              type="date"
              formControlName="dueDate"
              class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none transition-colors
                hover:border-indigo-300 focus:ring-1 focus:ring-indigo-600/70 focus:border-indigo-600" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
            <app-select formControlName="categoryId" [options]="categoryOptions" />
          </div>
        </div>
        @if (task) {
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="isCompleted" class="rounded" />
            <span class="text-sm">Completed</span>
          </label>
        }
        <div class="flex justify-end gap-2 pt-2">
          <app-button type="button" variant="ghost" (click)="onClose()">Cancel</app-button>
          <app-button type="submit" variant="secondary">Save</app-button>
        </div>
      </form>
    </div>
  </div>
}
